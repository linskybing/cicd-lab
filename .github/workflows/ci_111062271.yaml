name: ci-111062271

on:
  push:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  prettier:
    name: Prettier check
    needs: typecheck
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: >
          npx prettier --check
          ".github/workflows/ci_111062271.yaml"
          "src/**/*.ts"
          "test/**/*.ts"
          "package.json"
          "package-lock.json"
          "tsconfig.json"
          "vitest.config.ts"

  test:
    name: Test
    needs: prettier
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          set -o pipefail
          mkdir -p reports
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml 2>&1 | tee reports/vitest-output.txt

      - name: Publish test summary
        if: ${{ always() }}
        run: |
          echo "## Vitest Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/vitest-output.txt ]; then
            cat reports/vitest-output.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Vitest output captured." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
