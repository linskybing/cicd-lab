name: ci-111062271

on:
  push:

permissions:
  contents: read

env:
  NO_COLOR: '1'
  FORCE_COLOR: '0'
  TERM: dumb

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  prettier:
    name: Prettier check
    needs: typecheck
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check

  test:
    name: Test
    needs: prettier
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          mkdir -p reports
          set +e
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml 2>&1 | tee reports/vitest-output.raw.txt
          test_status=${PIPESTATUS[0]}
          perl -pe 's/\e\[[0-9;?]*[ -\/]*[@-~]//g' reports/vitest-output.raw.txt > reports/vitest-output.txt
          exit "$test_status"

      - name: Publish test summary
        if: ${{ always() }}
        run: |
          echo "## Vitest Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/vitest-output.txt ]; then
            cat reports/vitest-output.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No Vitest output captured." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: |
            reports/vitest-junit.xml
            reports/vitest-output.raw.txt
            reports/vitest-output.txt
          if-no-files-found: warn
