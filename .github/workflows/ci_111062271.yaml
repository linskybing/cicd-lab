name: ci-111062271

on:
  push:

permissions:
  actions: read
  checks: write
  contents: read

env:
  NO_COLOR: '1'
  FORCE_COLOR: '0'
  TERM: dumb

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  prettier:
    name: Prettier check
    needs: typecheck
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check

  test:
    name: Test
    needs: prettier
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          mkdir -p reports
          set +e
          npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml
          test_status=$?
          echo "status=$test_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish test report
        if: ${{ always() }}
        uses: dorny/test-reporter@v3
        with:
          name: Vitest Results
          path: reports/vitest-junit.xml
          reporter: java-junit
          use-actions-summary: true
          report-title: Vitest Results
          fail-on-empty: true

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: |
            reports/vitest-junit.xml
          if-no-files-found: warn

      - name: Fail if tests failed
        if: ${{ steps.tests.outputs.status != '0' }}
        run: exit "${{ steps.tests.outputs.status }}"
